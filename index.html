<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhật Ký Cảm Xúc | SUNNYCARE</title>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css?v=2030">
  <style>
    body {
      background: var(--bg-deep);
    }
    .journal-page {
      padding-top: calc(var(--nav-h) + 1.5rem);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .journal-container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1.5rem 4rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      flex: 1;
    }

    /* SIDEBAR (HISTORY) */
    .journal-sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--nav-h) - 4rem);
      position: sticky;
      top: calc(var(--nav-h) + 1.5rem);
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.2rem; color: #fff;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-logout { font-size: 0.8rem; color: var(--danger); cursor: pointer; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .history-title { font-size: 1rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .new-btn { 
      width: 32px; height: 32px; 
      border-radius: 50%; 
      background: var(--primary-dim); 
      color: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; border: 1px solid var(--border);
      transition: var(--t);
    }
    .new-btn:hover { background: var(--primary); color: #fff; transform: rotate(90deg); }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-right: 0.5rem;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .entry-item {
      padding: 1rem;
      border-radius: var(--r-md);
      background: var(--bg-glass);
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--t);
    }
    .entry-item:hover { background: var(--primary-dim); }
    .entry-item.active {
      background: var(--primary-dim);
      border-color: var(--primary);
    }
    .entry-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .entry-date { font-size: 0.75rem; font-weight: 700; color: var(--primary-light); }
    .entry-mood { font-size: 1.2rem; }
    .entry-preview { font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* EDITOR */
    .journal-editor {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .editor-overlay {
      position: absolute;
      inset: 0;
      background: rgba(7, 21, 32, 0.7);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-xl);
      opacity: 0; pointer-events: none;
      transition: var(--t);
    }
    .editor-overlay.loading { opacity: 1; pointer-events: all; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(25,146,176,0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .editor-date { font-size: 1.2rem; font-weight: 300; color: var(--text-secondary); }

    /* Mood selection */
    .mood-selector { margin-bottom: 2rem; }
    .mood-title { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .moods-grid {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .mood-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      padding: 0.8rem 1.2rem;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      transition: var(--t);
      opacity: 0.6;
    }
    .mood-btn:hover { opacity: 1; background: var(--primary-dim); }
    .mood-btn.active {
      opacity: 1;
      background: var(--primary-dim);
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 4px 15px var(--primary-glow);
    }
    .mood-emoji { font-size: 2rem; line-height: 1; }
    .mood-label { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); }

    .cbt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex: 1;
    }
    .cbt-col {
      display: flex;
      flex-direction: column;
    }
    .cbt-col label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary-light);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .editor-input {
      width: 100%;
      flex: 1;
      min-height: 150px;
      background: rgba(0,0,0,0.2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-size: 1.05rem;
      line-height: 1.6;
      font-family: var(--font);
      resize: vertical;
      outline: none;
      padding: 1rem;
      transition: var(--t);
    }
    .editor-input:focus {
      border-color: var(--primary) !important;
      background: var(--bg-card) !important;
    }
    .editor-input::placeholder { color: rgba(90, 143, 160, 0.4); font-size: 0.95rem; }
    
    @media (max-width: 768px) {
      .cbt-grid { grid-template-columns: 1fr; }
    }

    .editor-footer { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; }
    .save-status { font-size: 0.85rem; color: var(--text-muted); }

    @media (max-width: 900px) {
      .journal-container { grid-template-columns: 1fr; }
      .journal-sidebar { height: auto; max-height: 40vh; }
    }
  </style>
</head>
<body>
  <nav class="navbar" style="background: rgba(255, 255, 255, 0.97); border-bottom: 1px solid rgba(26,35,50,0.10);">
    <div class="nav-container">
      <a href="../index.html" class="nav-brand" aria-label="SUNNYCARE"><span class="brand-name-text">SUNNYCARE</span></a>
      <div class="nav-links" id="navLinks">
        <a href="../index.html" class="nav-link" data-vi="Trang Chủ" data-en="Home">Trang Chủ</a>
        <div class="nav-dropdown">
          <button class="nav-link dropdown-toggle" data-vi="Trắc Nghiệm ▾" data-en="Assessments ▾">Trắc Nghiệm ▾</button>
          <div class="dropdown-menu">
            <a href="../tests/phq9.html" class="dropdown-item" data-vi="Trầm Cảm (PHQ-9)" data-en="Depression (PHQ-9)">Trầm Cảm (PHQ-9)</a>
            <a href="../tests/gad7.html" class="dropdown-item" data-vi="Lo Âu (GAD-7)" data-en="Anxiety (GAD-7)">Lo Âu (GAD-7)</a>
            <a href="../tests/dass21.html" class="dropdown-item" data-vi="Stress (DASS-21)" data-en="Stress (DASS-21)">Stress (DASS-21)</a>
            <a href="../tests/ace.html" class="dropdown-item" data-vi="Tuổi Thơ (ACE)" data-en="Childhood (ACE)">Tuổi Thơ (ACE)</a>
          </div>
        </div>
        <a href="index.html" class="nav-link" data-vi="Nhật Ký" data-en="Journal">Nhật Ký</a>
        <div class="nav-dropdown">
          <button class="nav-link dropdown-toggle" data-vi="Công cụ ▾" data-en="Tools ▾">Công cụ ▾</button>
          <div class="dropdown-menu">
            <a href="../tools/grounding.html" class="dropdown-item" data-vi="Xoa Dịu (5-4-3-2-1)" data-en="Grounding (5-4-3-2-1)">Xoa Dịu (5-4-3-2-1)</a>
            <a href="../tools/mindfulness.html" class="dropdown-item" data-vi="Chánh Niệm" data-en="Mindfulness">Chánh Niệm</a>
          </div>
        </div>
        <a href="../tools/breathing.html" class="nav-link" data-vi="Thư Giãn" data-en="Wellness Tools">Thư Giãn</a>
      </div>
      <div class="nav-controls">
        <button class="music-toggle" id="musicToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- MUSIC PLAYER -->
  <div class="music-player" id="musicPlayer">
    <div class="music-header">
      <span class="music-title">🎵 Nhạc Không Lời Tĩnh Tâm</span>
      <button class="music-close" id="musicClose">✕</button>
    </div>
    <div class="music-tracks">
      <button class="track-btn active" data-track="piano">🎹 Piano</button>
      <button class="track-btn" data-track="rain">🌧️ Mưa</button>
      <button class="track-btn" data-track="ocean">🌊 Biển</button>
      <button class="track-btn" data-track="forest">🌲 Rừng</button>
    </div>
    <div class="music-controls">
      <button class="play-pause-btn" id="playPauseBtn">
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="pause-icon hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30">
    </div>
  </div>

  <main class="journal-page">
    <div class="journal-container">
      
      <!-- SIDEBAR -->
      <aside class="journal-sidebar">
        <div class="user-profile">
          <div class="avatar" id="uAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="uName">Người Dùng</div>
            <div class="user-logout" onclick="logout()">Thoát an toàn</div>
          </div>
        </div>

        <div class="history-header">
          <span class="history-title">Các ghi chép cũ</span>
          <button class="new-btn" onclick="createNewEntry()" title="Viết mới">+</button>
        </div>

        <div class="history-list" id="historyList">
          <!-- Populated by JS -->
        </div>
      </aside>

      <!-- EDITOR -->
      <section class="journal-editor">
        <div class="editor-overlay" id="editorLoader">
          <div class="spinner"></div>
          <p style="margin-top:1rem; color:var(--text-secondary); font-weight:600;">Đang giải mã...</p>
        </div>

        <div class="editor-header">
          <div class="editor-date" id="docDate">Hôm Nay</div>
        </div>

        <div class="mood-selector">
          <div class="mood-title">Cảm xúc của bạn lúc này?</div>
          <div class="moods-grid" id="moodGrid">
            <button class="mood-btn" data-mood="excellent">
              <span class="mood-emoji">🤩</span>
              <span class="mood-label">Tuyệt vời</span>
            </button>
            <button class="mood-btn" data-mood="good">
              <span class="mood-emoji">🙂</span>
              <span class="mood-label">Ổn</span>
            </button>
            <button class="mood-btn" data-mood="neutral">
              <span class="mood-emoji">😐</span>
              <span class="mood-label">Bình thường</span>
            </button>
            <button class="mood-btn" data-mood="bad">
              <span class="mood-emoji">😔</span>
              <span class="mood-label">Tệ</span>
            </button>
            <button class="mood-btn" data-mood="awful">
              <span class="mood-emoji">哭</span> <!-- Using character, wait: 😭 -->
              <span class="mood-label">Rất tệ</span>
            </button>
          </div>
        </div>

        <div class="cbt-grid">
          <div class="cbt-col">
            <label>1. Tình huống</label>
            <textarea class="editor-input" id="docSituation" placeholder="Sự kiện gì vừa diễn ra? Bạn đang ở đâu? Với ai?"></textarea>
          </div>
          <div class="cbt-col">
            <label>2. Suy nghĩ tự động</label>
            <textarea class="editor-input" id="docThoughts" placeholder="Điều gì vừa lướt qua trong đầu bạn lúc đó?"></textarea>
          </div>
          <div class="cbt-col">
            <label>3. Cảm xúc & Cơ thể</label>
            <textarea class="editor-input" id="docEmotions" placeholder="Tim đập nhanh? Tức giận? Buồn bã? Căng thẳng?"></textarea>
          </div>
          <div class="cbt-col">
            <label>4. Hành động</label>
            <textarea class="editor-input" id="docActions" placeholder="Bạn đã phản ứng và hành động gì sau đó?"></textarea>
          </div>
        </div>

        <div class="editor-footer">
          <span class="save-status" id="saveStatus"></span>
          <button class="btn-primary" id="saveBtn" onclick="saveCurrentEntry()">
            <span>Lưu & Mã Hóa</span>
          </button>
        </div>
      </section>

    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../js/music.js?v=2030"></script>
  <script src="../js/app.js?v=2030"></script>
  <script src="../js/api.js?v=2030"></script>
  <script>
    // App State
    let token = '';
    let userInfo = {};
    let entries = [];
    let currentEntryId = null;
    let selectedMood = 'neutral';
    
    // DOM
    const loader = document.getElementById('editorLoader');
    const uName = document.getElementById('uName');
    const uAvatar = document.getElementById('uAvatar');
    const historyList = document.getElementById('historyList');
    const docDate = document.getElementById('docDate');
    const docSituation = document.getElementById('docSituation');
    const docThoughts = document.getElementById('docThoughts');
    const docEmotions = document.getElementById('docEmotions');
    const docActions = document.getElementById('docActions');
    const saveStatus = document.getElementById('saveStatus');
    const saveBtn = document.getElementById('saveBtn');

    // Mappings
    const moodMap = {
      'excellent': { e: '🤩', t: 'Tuyệt vời' },
      'good': { e: '🙂', t: 'Ổn' },
      'neutral': { e: '😐', t: 'Bình thường' },
      'bad': { e: '😔', t: 'Tệ' },
      'awful': { e: '😭', t: 'Rất tệ' }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      // Setup music
      const badBtn = document.querySelector('[data-mood="awful"] .mood-emoji');
      if(badBtn) badBtn.textContent = '😭';

      token = localStorage.getItem('sc_token');
      if(!token) {
        window.location.href = 'auth.html';
        return;
      }

      // In a real app we'd fetch user profile. Here we use locally stored mock name.
      const rawUser = localStorage.getItem('sc_user');
      if(rawUser) {
        userInfo = JSON.parse(rawUser);
        uName.textContent = userInfo.name || 'Người Dùng';
        uAvatar.textContent = (userInfo.name || 'U').charAt(0).toUpperCase();
      }

      setupMoods();
      await loadEntries();
    });

    async function loadEntries() {
      loader.classList.add('loading');
      try {
        const res = await API.getJournal(token);
        if(res && res.entries) {
          entries = res.entries.sort((a,b) => b.timestamp - a.timestamp);
        } else {
          entries = [];
        }
        renderHistory();
        if(entries.length > 0) {
          openEntry(entries[0].id);
        } else {
          createNewEntry();
        }
      } catch(err) {
        console.error(err);
        window.SC?.showToast('Không thể tải dữ liệu nhật ký', 'error');
      } finally {
        loader.classList.remove('loading');
      }
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if(entries.length === 0) {
        historyList.innerHTML = '<p style="color:var(--text-muted); font-size:0.85rem; padding: 1rem; text-align:center;">Chưa có ghi chép nào</p>';
        return;
      }

      entries.forEach(entry => {
        const d = new Date(entry.timestamp);
        const dateStr = d.toLocaleDateString('vi-VN', { day:'numeric', month:'short' });
        
        let rawText = '';
        try {
          const parsed = JSON.parse(entry.content);
          rawText = (parsed.situation || '') + ' ' + (parsed.thoughts || '') + ' ' + (parsed.emotions || '');
        } catch(e) {
          rawText = entry.content; // Fallback
        }
        const textPreview = rawText.replace(/<[^>]*>?/gm, '').substring(0, 40).trim() || '...';
        
        const el = document.createElement('div');
        el.className = `entry-item ${entry.id === currentEntryId ? 'active' : ''}`;
        el.onclick = () => openEntry(entry.id);
        
        el.innerHTML = `
          <div class="entry-meta">
            <span class="entry-date">${dateStr}</span>
            <span class="entry-mood">${moodMap[entry.mood]?.e || '😐'}</span>
          </div>
          <div class="entry-preview">${textPreview}</div>
        `;
        historyList.appendChild(el);
      });
    }

    function createNewEntry() {
      currentEntryId = 'new_' + Date.now();
      docDate.textContent = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      docSituation.value = '';
      docThoughts.value = '';
      docEmotions.value = '';
      docActions.value = '';
      setMood('neutral');
      renderHistory(); // update active state
      docSituation.focus();
    }

    function openEntry(id) {
      if(id === currentEntryId) return;
      
      const target = entries.find(e => e.id === id);
      if(!target) return;

      currentEntryId = id;
      docDate.textContent = new Date(target.timestamp).toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour:'2-digit', minute:'2-digit' });
      
      let parsed = { situation: '', thoughts: '', emotions: '', actions: '' };
      try {
        parsed = JSON.parse(target.content);
      } catch(e) {
        // Fallback for legacy plain text entries
        parsed.situation = target.content;
      }
      
      docSituation.value = parsed.situation || '';
      docThoughts.value = parsed.thoughts || '';
      docEmotions.value = parsed.emotions || '';
      docActions.value = parsed.actions || '';
      
      setMood(target.mood || 'neutral');
      
      renderHistory();
    }

    function setupMoods() {
      document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const btnEl = e.target.closest('.mood-btn');
          setMood(btnEl.dataset.mood);
        });
      });
    }

    function setMood(moodKey) {
      selectedMood = moodKey;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.querySelector(`.mood-btn[data-mood="${moodKey}"]`);
      if(activeBtn) activeBtn.classList.add('active');
    }

    async function saveCurrentEntry() {
      const situation = docSituation.value.trim();
      const thoughts = docThoughts.value.trim();
      const emotions = docEmotions.value.trim();
      const actions = docActions.value.trim();
      
      if(!situation && !thoughts && !emotions && !actions) {
        window.SC?.showToast('Hãy viết ít nhất một thông tin', 'warning');
        return;
      }

      saveBtn.classList.add('loading');
      saveStatus.textContent = 'Đang lưu...';

      const serializedContent = JSON.stringify({ situation, thoughts, emotions, actions });

      const entryData = {
        id: currentEntryId.toString().startsWith('new_') ? Date.now() : currentEntryId,
        timestamp: currentEntryId.toString().startsWith('new_') ? Date.now() : entries.find(e=>e.id===currentEntryId).timestamp,
        content: serializedContent,
        mood: selectedMood
      };

      try {
        await API.saveJournal(token, entryData);
        window.SC?.showToast('Đã lưu an toàn', 'success');
        
        const existingIdx = entries.findIndex(e => e.id === entryData.id);
        if(existingIdx >= 0) {
          entries[existingIdx] = entryData;
        } else {
          entries.unshift(entryData);
          currentEntryId = entryData.id; 
        }
        renderHistory();
      } catch(err) {
        console.error(err);
        window.SC?.showToast('Lỗi khi lưu!', 'error');
      } finally {
        saveBtn.classList.remove('loading');
        saveStatus.textContent = '';
      }
    }

    // Auto save hint
    let autoSaveTimer;
    [docSituation, docThoughts, docEmotions, docActions].forEach(el => {
      el.addEventListener('input', () => {
        saveStatus.textContent = 'Chưa lưu...';
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
          saveStatus.textContent = 'Đang tự cập nhật...';
          saveCurrentEntry();
        }, 5000); 
      });
    });

    function logout() {
      localStorage.removeItem('sc_token');
      localStorage.removeItem('sc_user');
      window.location.href = 'auth.html';
    }
  </script>
</body>
</html>
